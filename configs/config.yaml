server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"

database:
  driver: "sqlite"
  dsn: "gateway.db"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

logging:
  level: "info"
  format: "json"
  output: "stdout"

mcp:
  session_ttl: 1h
  health_check_interval: 30s
  reconnect_backoff: 5s
  max_reconnect_attempts: 10

security:
  api_key_length: 32
  rate_limit: 100
